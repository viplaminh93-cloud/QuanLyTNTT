<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Điểm danh Thiếu Nhi</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!--=========================
            TRANG CHỦ
    ==========================-->

    <div class="card home">

        <div class="logo">

            <img
            src="logo.png"
            alt="Logo Giáo xứ"
            id="logo">

        </div>

        <h1>

            GIÁO XỨ PHÚ HÒA

        </h1>

        <div class="subTitle">

            HỆ THỐNG ĐIỂM DANH QR

        </div>

        <button
        class="btn btnBlue"
        onclick="startApp('Dự lễ')">

            DỰ LỄ

        </button>

        <button
        class="btn btnBlue"
        onclick="startApp('Giáo lý')">

            GIÁO LÝ

        </button>

    </div>



    <!--=========================
            MÀN HÌNH QUÉT
    ==========================-->

    <div
    id="scannerBox"
    class="card hidden">

        <div
        id="typeTitle"
        class="scannerTitle">
        </div>

        <div
        id="todayCount"
        class="todayCount">

            Đã điểm danh hôm nay: 0 em

        </div>

        <div id="reader"></div>

        <button
        class="back"
        onclick="backHome()">

            QUAY LẠI

        </button>

    </div>

</div>



<!--=========================
        POPUP KẾT QUẢ
==========================-->

<div
id="overlay"
class="hidden">

    <div id="overlayCard">

        <div id="overlayTitle">

            ĐIỂM DANH THÀNH CÔNG

        </div>

        <img id="overlayPhoto">

        <div id="overlayName"></div>
        
        <div id="overlayKhoi"></div>
        
        <div id="overlayClass"></div>
        
        <div id="overlayCode"></div>
        
        <div id="overlayTime"></div>

        <div id="overlayHint">

            Chạm màn hình để tiếp tục

        </div>

    </div>

</div>



<script src="https://unpkg.com/html5-qrcode"></script>

<script src="app.js?v=2"></script>

</body>

</html>
