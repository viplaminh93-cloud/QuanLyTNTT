<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Điểm danh Thiếu Nhi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="card home">

    <div class="logo">
        📷
    </div>


    <h1>
        GIÁO XỨ PHÚ HÒA
    </h1>


    <h2>
        ĐIỂM DANH QR
    </h2>


    <p>
        Chọn hoạt động
    </p>


    <button class="btn lễ"
    onclick="startApp('Dự lễ')">
        ⛪ Dự lễ
    </button>


    <button class="btn giaoly"
    onclick="startApp('Giáo lý')">
        📖 Giáo lý
    </button>


</div>




<div id="scannerBox" class="card hidden">


<h2 id="typeTitle"></h2>


<div id="reader"></div>


<button class="back"
onclick="backHome()">

ĐỔI LOẠI ĐIỂM DANH

</button>


</div>


</div>





<!-- POPUP KẾT QUẢ -->


<div id="overlay" class="hidden">


<div id="overlayCard">


<div id="overlayIcon">
✅
</div>


<div id="overlayTitle">
ĐIỂM DANH THÀNH CÔNG
</div>


<img id="overlayPhoto">


<div id="overlayName"></div>


<div id="overlayCode"></div>


<div id="overlayClass"></div>


<div id="overlayHint">

Chạm màn hình để tiếp tục

</div>


</div>


</div>





<script src="https://unpkg.com/html5-qrcode"></script>

<script src="app.js"></script>


</body>

</html>
