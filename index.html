            <div class="card home">
        
                <div class="logo">
        
                    <img
                        class="logo"

                <h1>

                <div class="subTitle">

                </div>
        
                <button
                class="btn btnBlue"
                onclick="startApp(LOAI.LE)">
        
                    DỰ LỄ

                <button
                class="btn btnBlue"
                onclick="startApp(LOAI.GIAOLY)">
        
                    GIÁO LÝ
        
                </button>
        
                
                <button
                    id="installBtn"
                    class="btn install hidden">
                
                    CÀI ĐẶT ỨNG DỤNG
                
                </button>
        
        
                
            </div>
        
        
        
            <!--=========================
                    MÀN HÌNH QUÉT
            ==========================-->
        
            <div
            id="scannerBox"
            class="card hidden">
        
                <div
                id="typeTitle"
                class="scannerTitle">
                </div>
        
                <div
                id="todayCount"
                class="todayCount">
        
                    Đã điểm danh hôm nay: 0 em
        
                </div>
        
                <div id="reader"></div>
        
                <button
                class="back"
                onclick="backHome()">
        
                    QUAY LẠI
        
                </button>
        
            </div>
        
        </div>
        
        
        
        <!--=========================
                POPUP KẾT QUẢ
        ==========================-->
        
        <div
        id="overlay"
        class="hidden">
        
            <div id="overlayCard">
        
                <div id="overlayTitle">
        
                    ĐIỂM DANH THÀNH CÔNG
        
                </div>
        
                <img id="overlayPhoto">
        
                <div id="overlayName"></div>
                
                <div id="overlayKhoi"></div>
                
                <div id="overlayClass"></div>
                
                <div id="overlayCode"></div>
                
                <div id="overlayTime"></div>
        
                <div id="overlayHint">
        
                    Chạm màn hình để tiếp tục
        
                </div>
        
            </div>
        
        </div>
        
        
        <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
