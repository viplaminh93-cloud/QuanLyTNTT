<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Dashboard

    </title>

    <link
        rel="stylesheet"
        href="dashboard/dashboard.css">

</head>


    

<body>

        <div class="container">
        
            <h1>
        
                GIÁO XỨ PHÚ HÒA
        
            </h1>
        
            <h2>
        
                DASHBOARD
        
            </h2>
        
        
        
            <!--=========================
                    TỔNG QUAN
            ==========================-->
        
            <div class="toolbar">
            
                <div>
            
                    <button id="btnLe" class="filter-btn active">
            
                        Dự lễ
            
                    </button>
            
                    <button id="btnGiaoLy" class="filter-btn">
            
                        Giáo lý
            
                    </button>
            
                </div>
            
                <div>
            
                    Tổng:
            
                    <b id="tongDanhSach">0</b>
            
                </div>
            
            </div>
        
        
        
            <!--=========================
                    NÚT
            ==========================-->
        
            <div class="actions">
        
                <button
                    id="btnRefresh">
        
                    Làm mới
        
                </button>
        
            </div>
        
        
        

        
            <!--=========================
                    DANH SÁCH
            =========================-->
            
            <table>
            
                <thead>
            
                    <tr>
            
                        <th>STT</th>
            
                        <th>Mã số</th>
            
                        <th>Họ tên</th>
            
                        <th>Lớp</th>
            
                        <th>Giờ</th>
            
                    </tr>
            
                </thead>
            
                <tbody id="attendanceBody">
            
                </tbody>
            
            </table>




            
        
        </div>


        
        <script src="../system/config.js"></script>
        <script src="../system/utils.js"></script>
        <script src="../system/version.js"></script>
        <script src="../system/auth.js"></script>
        <script src="../dashboard/dashboard.js"></script>

</body>

</html>
